<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Relatório Técnico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-orange: #FF6B35;
            --primary-yellow: #FFD23F;
            --primary-green: #06D6A0;
            --primary-blue: #118AB2;
            --dark-bg: #0a0e27;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1328 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(17, 138, 178, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(6, 214, 160, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px 20px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.8s ease-out 0.2s both;
            overflow: visible;
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-subtitle {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 14px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            border-color: var(--primary-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(17, 138, 178, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .radio-item {
            width: 100%;
            position: relative;
        }

        .radio-item input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-label {
            display: block;
            padding: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 15px;
        }

        .radio-item input[type="radio"]:checked + .radio-label {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-green));
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(17, 138, 178, 0.4);
        }

        /* Search Box - Estilo Google */
        .search-container {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-input-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.2s ease;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 12px rgba(17, 138, 178, 0.3);
        }

        /* Resultados da pesquisa - Estilo Google */
        .search-results {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #1a1f3a;
            border: 2px solid var(--primary-blue);
            border-radius: 20px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 10000;
            display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .search-results.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        .search-item {
            padding: 16px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        .search-item:active {
            background: rgba(17, 138, 178, 0.3);
        }

        .search-item:last-child {
            border-bottom: none;
        }

        .search-item-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 15px;
        }

        .search-item-category {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Quantidade e Botão */
        .qty-input {
            width: 100% !important;
            padding: 16px !important;
            text-align: center;
            font-weight: 700;
            border-radius: 16px !important;
            border-color: var(--primary-orange) !important;
            font-size: 16px;
        }

        .btn-add {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-yellow));
            border: none;
            border-radius: 16px;
            color: #0a0e27;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-add:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Material List */
        .material-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            min-height: 50px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px dashed var(--border-color);
        }

        .material-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-green));
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            animation: popIn 0.2s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .material-item .remove {
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            opacity: 0.8;
            transition: opacity 0.2s;
            padding: 0 4px;
        }

        .material-item .remove:active {
            opacity: 1;
            transform: scale(1.2);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-yellow), var(--primary-green));
            background-size: 200% 200%;
            border: none;
            border-radius: 16px;
            color: #0a0e27;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Report Container */
        .relatorio-gerado {
            margin-top: 24px;
            animation: fadeInUp 0.4s ease;
        }

        .relatorio-gerado textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--primary-green);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            border-radius: 16px;
        }

        .btn-copiar {
            width: 100%;
            margin-top: 15px;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-green), var(--primary-blue));
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 15px;
        }

        .btn-copiar:active {
            transform: scale(0.98);
        }

        /* Error Message */
        .error {
            background: rgba(255, 107, 53, 0.2);
            border: 2px solid var(--primary-orange);
            color: var(--primary-orange);
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            animation: shake 0.4s ease;
            font-size: 14px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ajustes específicos para mobile */
        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }

            .card {
                padding: 20px 16px;
            }

            .card-title {
                font-size: 24px;
            }

            input[type="text"],
            input[type="number"],
            textarea,
            .search-input,
            .qty-input,
            .btn-add,
            .btn-submit,
            .btn-copiar {
                font-size: 16px;
                padding: 14px;
            }

            .material-item {
                font-size: 13px;
                padding: 8px 14px;
            }

            .search-item {
                padding: 14px 16px;
            }

            .search-item-name {
                font-size: 14px;
            }

            .search-item-category {
                font-size: 11px;
            }

            /* Melhorias de toque */
            .radio-label,
            .btn-add,
            .btn-submit,
            .btn-copiar,
            .search-item,
            .material-item .remove {
                min-height: 48px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .material-item .remove {
                min-height: auto;
                width: 32px;
            }
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-green));
            border-radius: 10px;
        }

        /* Overlay para quando a pesquisa estiver aberta */
        .search-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
        }

        .search-overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Overlay para fechar resultados ao clicar fora -->
    <div class="search-overlay" id="searchOverlay"></div>

    <div class="container">
        <div class="card">
            <h1 class="card-title">Novo Relatório</h1>
            <p class="card-subtitle">Preencha os dados abaixo</p>

            <div id="mensagemErro" class="error"></div>

            <form id="formRelatorio">
                <div class="form-group">
                    <label>👤 Técnico</label>
                    <input type="text" name="tecnico" placeholder="Nome do técnico" required>
                </div>

                <div class="form-group">
                    <label>📝 O que foi feito</label>
                    <textarea name="relatorio_texto" rows="4" placeholder="Descreva as atividades..." required></textarea>
                </div>

                <div class="form-group">
                    <label>⚠️ Problema</label>
                    <textarea name="problema_tecnico" rows="4" placeholder="Descreva o problema..." required></textarea>
                </div>

                <div class="form-group">
                    <label>🔧 Equipamento</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" name="equipamento_status" value="Cabeado" id="cabeado" required>
                            <label for="cabeado" class="radio-label">✅ Cabeado</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="equipamento_status" value="Não Cabeado" id="nao-cabeado" required>
                            <label for="nao-cabeado" class="radio-label">❌ Não Cabeado</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="equipamento_status" value="Rejeitado" id="rejeitado" required>
                            <label for="rejeitado" class="radio-label">🚫 Rejeitado</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>📌 Observações</label>
                    <textarea name="equipamento_obs" rows="2" placeholder="Observações adicionais..."></textarea>
                </div>

                <div class="form-group">
                    <label>📡 Maior Sinal RSSI</label>
                    <input type="text" name="maior_sinal" placeholder="Ex: -45 dBm" required>
                </div>

                <div class="form-group">
                    <label>📦 Materiais Utilizados</label>
                    <div class="search-container">
                        <div class="search-box">
                            <div class="search-input-wrapper">
                                <input type="text" class="search-input" id="searchUtilizados" placeholder="Buscar material..." autocomplete="off">
                            </div>
                            <div class="search-results" id="resultsUtilizados"></div>
                            <input type="number" class="qty-input" id="qtyUtilizados" placeholder="Quantidade" min="1" value="1">
                            <button type="button" class="btn-add" id="btnAddUtilizados">Adicionar</button>
                        </div>
                    </div>
                    <div class="material-list" id="listUtilizados"></div>
                    <textarea name="materiais_utilizados" id="materiais_utilizados" rows="3" readonly placeholder="Materiais adicionados..."></textarea>
                </div>

                <div class="form-group">
                    <label>♻️ Materiais Recolhidos</label>
                    <div class="search-container">
                        <div class="search-box">
                            <div class="search-input-wrapper">
                                <input type="text" class="search-input" id="searchRecolhidos" placeholder="Buscar material..." autocomplete="off">
                            </div>
                            <div class="search-results" id="resultsRecolhidos"></div>
                            <input type="number" class="qty-input" id="qtyRecolhidos" placeholder="Quantidade" min="1" value="1">
                            <button type="button" class="btn-add" id="btnAddRecolhidos">Adicionar</button>
                        </div>
                    </div>
                    <div class="material-list" id="listRecolhidos"></div>
                    <textarea name="materiais_recolhidos" id="materiais_recolhidos" rows="3" readonly placeholder="Materiais adicionados..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    Gerar Relatório
                </button>
            </form>

            <div class="relatorio-gerado" id="relatorioContainer" style="display:none;">
                <h2 style="margin-bottom: 15px; font-size: 22px;">📄 Relatório</h2>
                <textarea id="relatorioTexto" readonly rows="15"></textarea>
                <button type="button" class="btn-copiar" id="btnCopiar">Copiar</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        console.log("=== SCRIPT INICIADO ===");
        
        let materiaisDisponiveis = [];
        let materiaisUtilizados = [];
        let materiaisRecolhidos = [];
        let selectedMaterial = { utilizados: null, recolhidos: null };
        let activeSearch = null;

        // Materiais de exemplo
        const materiaisExemplo = [
            { nome: "CONECTOR APC", categoria: "Conectores" },
            { nome: "CONECTOR SC", categoria: "Conectores" },
            { nome: "CABO DROP 50m", categoria: "Cabos" },
            { nome: "CABO DROP 100m", categoria: "Cabos" },
            { nome: "FUSÍVEL 5A", categoria: "Elétrica" },
            { nome: "FUSÍVEL 10A", categoria: "Elétrica" },
            { nome: "PARAFUSO 6mm", categoria: "Fixação" },
            { nome: "PARAFUSO 8mm", categoria: "Fixação" },
            { nome: "ABRAÇADEIRA 100mm", categoria: "Fixação" },
            { nome: "ABRAÇADEIRA 200mm", categoria: "Fixação" },
            { nome: "ADAPTADOR APC", categoria: "Adaptadores" },
            { nome: "ADAPTADOR SC", categoria: "Adaptadores" },
            { nome: "ATENUADOR 5dB", categoria: "Atenuadores" },
            { nome: "ATENUADOR 10dB", categoria: "Atenuadores" }
        ];

        async function carregarMateriais() {
            try {
                // Tenta carregar da API
                const response = await fetch('/api/materiais');
                const data = await response.json();
                materiaisDisponiveis = data.materiais || [];
                
                if (materiaisDisponiveis.length === 0) {
                    materiaisDisponiveis = materiaisExemplo;
                }
            } catch (err) {
                console.log("Usando materiais de exemplo");
                materiaisDisponiveis = materiaisExemplo;
            }
            
            console.log("✅", materiaisDisponiveis.length, "materiais carregados");
            init();
        }

        function init() {
            setupSearch('utilizados');
            setupSearch('recolhidos');
            setupForm();
            
            // Overlay para fechar resultados
            const overlay = document.getElementById('searchOverlay');
            overlay.addEventListener('click', function() {
                closeAllResults();
            });
        }

        function closeAllResults() {
            document.querySelectorAll('.search-results').forEach(r => r.classList.remove('show'));
            document.getElementById('searchOverlay').classList.remove('active');
            activeSearch = null;
        }

        function setupSearch(tipo) {
            const searchInput = document.getElementById('search' + tipo.charAt(0).toUpperCase() + tipo.slice(1));
            const resultsDiv = document.getElementById('results' + tipo.charAt(0).toUpperCase() + tipo.slice(1));
            const qtyInput = document.getElementById('qty' + tipo.charAt(0).toUpperCase() + tipo.slice(1));
            const btnAdd = document.getElementById('btnAdd' + tipo.charAt(0).toUpperCase() + tipo.slice(1));
            
            if (!searchInput || !resultsDiv) {
                console.error("Elementos não encontrados para:", tipo);
                return;
            }
            
            // Input event para busca
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase().trim();
                resultsDiv.innerHTML = '';
                
                if (query.length < 1) {
                    resultsDiv.classList.remove('show');
                    document.getElementById('searchOverlay').classList.remove('active');
                    return;
                }
                
                const filtered = materiaisDisponiveis.filter(function(m) {
                    return m.nome.toLowerCase().includes(query) || 
                           m.categoria.toLowerCase().includes(query);
                });
                
                if (filtered.length > 0) {
                    filtered.forEach(function(material) {
                        const item = document.createElement('div');
                        item.className = 'search-item';
                        item.innerHTML = '<div class="search-item-name">' + material.nome + '</div>' +
                                       '<div class="search-item-category">' + material.categoria + '</div>';
                        
                        item.addEventListener('click', function() { 
                            selectMaterial(tipo, material, searchInput, resultsDiv);
                            qtyInput.focus();
                        });
                        
                        resultsDiv.appendChild(item);
                    });
                    
                    resultsDiv.classList.add('show');
                    document.getElementById('searchOverlay').classList.add('active');
                    activeSearch = tipo;
                } else {
                    resultsDiv.classList.remove('show');
                    document.getElementById('searchOverlay').classList.remove('active');
                }
            });

            // Focar no input
            searchInput.addEventListener('focus', function() {
                if (searchInput.value.length > 0) {
                    resultsDiv.classList.add('show');
                    document.getElementById('searchOverlay').classList.add('active');
                }
            });

            // Botão adicionar
            btnAdd.addEventListener('click', function() {
                addMaterial(tipo);
            });

            // Enter no input de quantidade
            qtyInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addMaterial(tipo);
                }
            });

            // Prevenir que o clique no input feche os resultados
            searchInput.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }

        function selectMaterial(tipo, material, searchInput, resultsDiv) {
            selectedMaterial[tipo] = material;
            searchInput.value = material.nome;
            resultsDiv.classList.remove('show');
            document.getElementById('searchOverlay').classList.remove('active');
        }

        function addMaterial(tipo) {
            const material = selectedMaterial[tipo];
            const qtyInput = document.getElementById('qty' + tipo.charAt(0).toUpperCase() + tipo.slice(1));
            const qty = parseInt(qtyInput.value);
            const searchInput = document.getElementById('search' + tipo.charAt(0).toUpperCase() + tipo.slice(1));
            
            if (!material) {
                alert('Selecione um material da lista!');
                searchInput.focus();
                return;
            }
            
            if (!qty || qty < 1) {
                alert('Informe uma quantidade válida!');
                qtyInput.focus();
                return;
            }
            
            const materialEntry = qty + ':' + material.nome;
            
            if (tipo === 'utilizados') {
                const existingIndex = materiaisUtilizados.findIndex(function(m) { 
                    return m.split(':')[1] === material.nome; 
                });
                
                if (existingIndex >= 0) {
                    const parts = materiaisUtilizados[existingIndex].split(':');
                    const novaQtd = parseInt(parts[0]) + qty;
                    materiaisUtilizados[existingIndex] = novaQtd + ':' + material.nome;
                } else {
                    materiaisUtilizados.push(materialEntry);
                }
                updateMaterialList('utilizados');
            } else {
                const existingIndex = materiaisRecolhidos.findIndex(function(m) { 
                    return m.split(':')[1] === material.nome; 
                });
                
                if (existingIndex >= 0) {
                    const parts = materiaisRecolhidos[existingIndex].split(':');
                    const novaQtd = parseInt(parts[0]) + qty;
                    materiaisRecolhidos[existingIndex] = novaQtd + ':' + material.nome;
                } else {
                    materiaisRecolhidos.push(materialEntry);
                }
                updateMaterialList('recolhidos');
            }
            
            // Limpar campos
            searchInput.value = '';
            qtyInput.value = '1';
            selectedMaterial[tipo] = null;
            closeAllResults();
            searchInput.focus();
        }

        function updateMaterialList(tipo) {
            const listDiv = document.getElementById('list' + tipo.charAt(0).toUpperCase() + tipo.slice(1));
            const textarea = document.getElementById('materiais_' + tipo);
            const materiais = tipo === 'utilizados' ? materiaisUtilizados : materiaisRecolhidos;
            
            textarea.value = materiais.join('\n');
            listDiv.innerHTML = '';
            
            materiais.forEach(function(item, index) {
                const parts = item.split(':');
                const qtd = parts[0];
                const nome = parts[1];
                
                const span = document.createElement('span');
                span.className = 'material-item';
                span.innerHTML = qtd + 'x ' + nome + ' <span class="remove" data-tipo="' + tipo + '" data-index="' + index + '">×</span>';
                listDiv.appendChild(span);
            });
            
            // Adicionar eventos de remoção
            listDiv.querySelectorAll('.remove').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const tipo = e.target.getAttribute('data-tipo');
                    const index = parseInt(e.target.getAttribute('data-index'));
                    removeMaterial(tipo, index);
                });
            });
        }

        function removeMaterial(tipo, index) {
            if (tipo === 'utilizados') {
                materiaisUtilizados.splice(index, 1);
                updateMaterialList('utilizados');
            } else {
                materiaisRecolhidos.splice(index, 1);
                updateMaterialList('recolhidos');
            }
        }

        function setupForm() {
            const form = document.getElementById("formRelatorio");
            const btnSubmit = document.getElementById("btnSubmit");
            const erroDiv = document.getElementById("mensagemErro");
            const container = document.getElementById("relatorioContainer");
            const textarea = document.getElementById("relatorioTexto");

            form.addEventListener("submit", function(e) {
                e.preventDefault();

                erroDiv.style.display = "none";
                btnSubmit.disabled = true;
                btnSubmit.textContent = "Processando...";

                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                // Simular geração de relatório (já que não temos o backend)
                setTimeout(() => {
                    const relatorio = gerarRelatorioMock(data);
                    textarea.value = relatorio;
                    container.style.display = "block";
                    container.scrollIntoView({ behavior: "smooth" });
                    
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = "Gerar Relatório";
                }, 1000);
            });

            document.getElementById("btnCopiar").addEventListener("click", function() {
                navigator.clipboard.writeText(textarea.value)
                    .then(function() { 
                        const btn = document.getElementById("btnCopiar");
                        const original = btn.textContent;
                        btn.textContent = "Copiado!";
                        setTimeout(() => btn.textContent = original, 2000);
                    })
                    .catch(function() { alert("Erro ao copiar"); });
            });
        }

        function gerarRelatorioMock(data) {
            let relatorio = `RELATÓRIO TÉCNICO\n`;
            relatorio += `==================\n\n`;
            relatorio += `Técnico: ${data.tecnico}\n`;
            relatorio += `Data: ${new Date().toLocaleDateString('pt-BR')}\n\n`;
            relatorio += `ATIVIDADES REALIZADAS:\n${data.relatorio_texto}\n\n`;
            relatorio += `PROBLEMA ENCONTRADO:\n${data.problema_tecnico}\n\n`;
            relatorio += `EQUIPAMENTO: ${data.equipamento_status}\n`;
            if (data.equipamento_obs) relatorio += `Obs: ${data.equipamento_obs}\n`;
            relatorio += `SINAL RSSI: ${data.maior_sinal}\n\n`;
            
            if (materiaisUtilizados.length > 0) {
                relatorio += `MATERIAIS UTILIZADOS:\n`;
                materiaisUtilizados.forEach(m => {
                    const [qtd, nome] = m.split(':');
                    relatorio += `- ${qtd}x ${nome}\n`;
                });
                relatorio += `\n`;
            }
            
            if (materiaisRecolhidos.length > 0) {
                relatorio += `MATERIAIS RECOLHIDOS:\n`;
                materiaisRecolhidos.forEach(m => {
                    const [qtd, nome] = m.split(':');
                    relatorio += `- ${qtd}x ${nome}\n`;
                });
            }
            
            return relatorio;
        }

        carregarMateriais();
    })();
    </script>
</body>
</html>
